<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hvala ti na prijavi - Lokomoto Centar</title>

  <!-- NAPOMENA: Meta Pixel NE ide ovde nego na sam Webflow Thank You page
       (Page Settings → Custom Code → Head), jer se forma embed-uje preko iframe-a
       i konverziju želiš na pravom Webflow URL-u. -->

  <!-- Instrument Sans font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles.extra.css">

  <style>
    /* Referral kartica (prikazuje se kad referral sistem vrati link) */
    .ref-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 20px 22px; text-align: left; width: 100%; }
    .ref-card__label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 12px; }
    .ref-card__row { display: flex; gap: 8px; align-items: stretch; }
    .ref-card__input { flex: 1; min-width: 0; background: #fff; border: 1px solid var(--color-border); color: var(--color-text); font-family: inherit; font-size: 14px; padding: 12px 14px; border-radius: var(--radius-sm); outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ref-card__input:focus { border-color: var(--color-primary); }
    .ref-card__btn { background: var(--color-primary); color: #fff; border: none; padding: 12px 22px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .ref-card__btn:hover { background: var(--color-primary-dark); }
    .ref-card__btn.is-copied { background: var(--color-success); }
    .ref-card__hint { margin-top: 12px; font-size: 13px; line-height: 1.55; color: var(--color-text-muted); }
    .ref-card__hint a { color: var(--color-primary-dark); font-weight: 600; }
    .ref-card__status { font-size: 14px; color: var(--color-text-muted); text-align: center; padding: 6px 0; }
  </style>
</head>
<body>

  <div class="quiz-container">
    <div class="thanks">
      <div class="thanks__icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"></path><circle cx="12" cy="12" r="10"></circle>
        </svg>
      </div>
      <h2 class="thanks__title">Hvala ti na prijavi</h2>

      <div class="thanks__ps">
        P.S.&nbsp; Dupliraj svoju šansu: Ukoliko ti preporučiš prijatelju da se prijavi i on pobedi - nagradu osvajaš i ti 🍀
      </div>

      <!-- REFERRAL LINK - widget se popunjava iz lokomoto-referral-system -->
      <div class="thanks__referral" id="referralSlot" hidden></div>
    </div>
  </div>

  <script>
  (function () {
    // Isti config kao u js/form.js. Kad postaviš REFERRAL_API → ide pravi Supabase backend.
    var REFERRAL_API = 'https://lokomoto-referral-system.vercel.app/api/signup'; // pravi Supabase backend
    var GIVEAWAY_SHARE_URL = 'https://kviz.lokomoto.rs/giveaway'; // baza za link (lokalni mod)
    var DASHBOARD_URL = 'https://lokomoto-referral-system.vercel.app'; // Vercel dashboard baza

    var slot = document.getElementById('referralSlot');
    if (!slot) return;

    var signup = readSignup();

    if (REFERRAL_API && signup.email) {
      // PRAVI BACKEND (Supabase preko Vercel-a)
      slot.hidden = false;
      slot.innerHTML = '<div class="ref-card"><div class="ref-card__status">Pripremamo tvoj referral link…</div></div>';
      postSignup(1)
        .then(function (data) { renderCard(data.shareUrl || '', data.dashboardUrl || ''); })
        .catch(function () {
          slot.innerHTML = '<div class="ref-card"><div class="ref-card__status">Link će uskoro biti dostupan. Osveži stranicu za minut.</div></div>';
        });
    } else if (signup.localRefCode) {
      // LOKALNI MOD (bez Supabase-a): odmah prikaži generisani link
      slot.hidden = false;
      var localShare = GIVEAWAY_SHARE_URL + (GIVEAWAY_SHARE_URL.indexOf('?') > -1 ? '&' : '?') + 'r=' + signup.localRefCode;
      var localDash = DASHBOARD_URL ? (DASHBOARD_URL + '/?demo=1') : '';
      renderCard(localShare, localDash);
    }
    // else: nema prijave u localStorage - widget ostaje sakriven

    // POST sa retry-em (3 pokušaja) — preživi Vercel/Supabase cold start
    function postSignup(attempt) {
      return fetch(REFERRAL_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: signup.email, name: signup.name, ref: signup.ref }),
      })
        .then(function (r) { if (!r.ok) throw new Error('status ' + r.status); return r.json(); })
        .catch(function (err) {
          if (attempt < 3) {
            return new Promise(function (res) { setTimeout(res, 900); }).then(function () { return postSignup(attempt + 1); });
          }
          throw err;
        });
    }

    function renderCard(share, dash) {
      var hint = dash
        ? 'Podeli ga sa prijateljima - svaka prijava preko tvog linka ti povećava šanse. Prati ih na <a href="' + esc(dash) + '" target="_blank" rel="noopener">svojoj platformi</a>.'
        : 'Podeli ga sa prijateljima - svaka prijava preko tvog linka ti povećava šanse, a ako neko koga pozoveš pobedi, nagradu osvajaš i ti 🍀';
      slot.innerHTML =
        '<div class="ref-card">' +
          '<div class="ref-card__label">Tvoj referral link</div>' +
          '<div class="ref-card__row">' +
            '<input class="ref-card__input" id="refInput" value="' + esc(share) + '" readonly />' +
            '<button class="ref-card__btn" id="refCopyBtn" type="button">Kopiraj</button>' +
          '</div>' +
          '<p class="ref-card__hint">' + hint + '</p>' +
        '</div>';
      var btn = document.getElementById('refCopyBtn');
      var input = document.getElementById('refInput');
      input.addEventListener('click', function () { input.select(); });
      btn.addEventListener('click', function () {
        var done = function () {
          btn.textContent = 'Kopirano ✓'; btn.classList.add('is-copied');
          setTimeout(function () { btn.textContent = 'Kopiraj'; btn.classList.remove('is-copied'); }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(input.value).then(done, fb);
        else fb();
        function fb() { input.select(); try { document.execCommand('copy'); } catch (e) {} done(); }
      });
    }

    function readSignup() {
      try {
        var raw = localStorage.getItem('lk_signup');
        if (!raw) return {};
        var o = JSON.parse(raw);
        return { email: (o && o.email) || '', name: (o && o.name) || '', ref: (o && o.ref) || '', localRefCode: (o && o.localRefCode) || '' };
      } catch (e) { return {}; }
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
  })();
  </script>

</body>
</html>
