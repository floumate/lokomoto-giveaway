<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lokomoto Centar - Giveaway prijava</title>

  <!-- Instrument Sans font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Telefon (flag-icons + libphonenumber) i datum (flatpickr) - isto kao onboarding forma -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.11.10/bundle/libphonenumber-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/sr.js"></script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles.extra.css">
</head>
<body>

  <!-- Glavni container -->
  <div class="quiz-container">

    <!-- Header sa back dugmetom + progress bar -->
    <div class="quiz-header">
      <button class="quiz-header__back hidden" id="globalBackBtn" aria-label="Nazad">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar__fill" id="progressBarFill"></div>
      </div>
    </div>

    <!-- Screens - sve generišemo kroz JS -->
    <div class="quiz-screens" id="quizScreens">
      <div class="loading">Učitavanje...</div>
    </div>

  </div>

  <!-- JavaScript -->
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
